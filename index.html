<!DOCTYPE html>

    /* =========================
   STEP 1: CSS RESET
   ========================= */

/* Remove default browser spacing */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* Base document setup */
html {
  scroll-behavior: smooth;
}

body {
  font-family: Arial, sans-serif;
  background-color: #ffffff;
  color: #111;
  line-height: 1.6;
}
/* =========================
   STEP 2: CSS RESET
   ========================= */

img {
  max-width: 100%;
  display: block;
}
/* =========================
   STEP 3: BASE BODY & TEXT
   ========================= */

body {

  color: #111;
  background: #ffffff;
  line-height: 1.6;
}

main {
  max-width: 1100px;
  margin: 0 auto;
  padding: 20px;
}

h2 {

}
/* =========================
   STEP 4: Header layout (desktop)
   ========================= */

.site-header {

}
/* =========================
   STEP 5: Menu spacing (desktop)
   ========================= */

.main-nav a {

}
/* =========================
   STEP 6: Mobile header layout
   ========================= */

@media (max-width: 768px) {

  .site-header {
    flex-direction: column;
    align-items: center;
  }

  .main-nav {
    margin-top: 12px;
  }

  .main-nav a {
    margin-left: 0;
  }

}
/* =========================
   STEP 6.1: Center hero heading
   ========================= */

/* =========================

   ========================= */

.main-nav a:hover {
  color: #7b2cbf;
}

/* =========================
   STEP 11: Hero button hover
   ========================= */

.hero-btn:hover {
  background-color: #5a189a;
}

/* Center section headings */
section h2 {
  text-align: center;
}
/* Hover effect */
.hero-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 25px rgba(123, 44, 191, 0.35);
}
/* =========================
   HERO — FINAL CLEAN VERSION
   ========================= */

.hero {
  background: #f6f3fb;
  padding: 60px 20px;
  margin: 40px auto 80px;
  border-radius: 16px;
  text-align: center;
}
/* HERO HEADING */
.hero h1 {
  font-size: 2.6rem;
  font-weight: 700;
  line-height: 1.25;
  max-width: 800px;
  margin: 0 auto 16px;
  color: #1b1026;
}

/* HERO PARAGRAPH */
.hero p {
  font-size: 1.1rem;
  line-height: 1.7;
  max-width: 650px;
  margin: 0 auto;
  color: #3d2b5a;
}
.hero p {
  color: #3d2b5a; /* softer but still strong */
}
/* =========================
   HERO BUTTON — FINAL CLEAN
   ========================= */
.hero-btn {
  display: inline-block;
  margin-top: 32px;
  padding: 16px 34px;
  font-size: 1rem;
  font-weight: 600;
  border-radius: 999px;
  background-color: #7b2cbf;
  color: #ffffff;
  text-decoration: none;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(123, 44, 191, 0.25);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.hero-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 28px rgba(123, 44, 191, 0.35);
}
.hero-btn:hover {
  box-shadow: 0 12px 28px rgba(123, 44, 191, 0.35);
}
/* =========================
   STEP L1: LOGO VISIBILITY FIX
   ========================= */

.logo-box {
  background: #111;              /* strong contrast */
  padding: 10px 14px;            /* breathing space */
  border-radius: 8px;            /* soft edges */
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.25);
}

.site-logo {
  display: block;
  max-width: 180px;
  height: auto;
}
/* =========================
   STEP 1: IMAGE SIZE CONTROL
   ========================= */

.work-gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 28px;
  align-items: center;
}

.work-item {
  display: flex;
  justify-content: center;
}

.work-item img {
  width: 100%;
  max-width: 220px;   /* KEY: controls image size */
  height: auto;
  border-radius: 10px;
  padding: 12px;
  background: #f2f2f2;
}
/* =========================
   FIX: COLUMN LAYOUT (LOGOS ABOVE POSTERS)
   ========================= */

.work-gallery {
  display: flex;
  flex-direction: column;   /* THIS is the key */
  gap: 50px;
}

/* Each row */
.work-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 28px;
  justify-items: center;
}
/* =========================
   FIX: UNIFORM IMAGE CARD SIZE
   ========================= */

.work-item {
  width: 260px;              /* SAME card width */
  height: 260px;             /* SAME card height */
  background: #f2f2f2;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 18px;
}

/* Image scaling inside card */
.work-item img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;       /* KEY: keeps logo/poster balanced */
}
/* =========================
   STEP 16: Work image hover effect
   ========================= */

.work-item img {
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

/* Hover effect */
.work-item img:hover {
  transform: translateY(-8px);
  box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
}
/* =========================
   IMAGE PREVIEW MODAL
   ========================= */

.image-modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
  z-index: 9999;
}

.image-modal.active {
  opacity: 1;
  pointer-events: auto;
}

.image-modal img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 12px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
}

.close-modal {
  position: absolute;
  top: 24px;
  right: 32px;
  font-size: 42px;
  color: #ffffff;
  cursor: pointer;
  line-height: 1;
}
/* =========================
   STEP 17: IMAGE PREVIEW ANIMATION
   ========================= */

/* Modal base */
#imageModal {
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

/* Modal active state */
#imageModal.active {
  opacity: 1;
  pointer-events: auto;
}

/* Image animation */
#imageModal img {
  transform: scale(0.92);
  transition: transform 0.3s ease;
}

#imageModal.active img {
  transform: scale(1);
}
/* =========================
   STEP 18: GALLERY HOVER FEEDBACK
   ========================= */

.work-item img {
  cursor: pointer;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.work-item img:hover {
  transform: translateY(-6px);
  box-shadow: 0 12px 28px rgba(0, 0, 0, 0.25);
}
/* =========================
   STEP 19: WORK SECTION STRUCTURE
   ========================= */

/* Space between logo row and poster row */
.work-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 32px;
  margin-bottom: 48px;
}

/* Center items inside each row */
.work-row .work-item {
  display: flex;
  justify-content: center;
}
/* =========================
   STEP 20: MOBILE GALLERY FIX
   ========================= */

@media (max-width: 768px) {

  .work-row {
    grid-template-columns: 1fr;
    gap: 24px;
  }

  .work-item img {
    max-width: 260px;
  }
}
/* =========================
   STEP 22: TYPOGRAPHY POLISH
   ========================= */

/* Section headings */
h2 {
  font-size: 2rem;
  letter-spacing: -0.4px;
  margin-bottom: 48px;
  color: #1b1026;
}

/* Paragraph refinement */
p {
  font-size: 1.05rem;
  line-height: 1.75;
  color: #3d2b5a;
}

/* Mobile text balance */
@media (max-width: 768px) {
  h2 {
    font-size: 1.7rem;
  }

  p {
    font-size: 1rem;
  }
}
/* =========================
   STEP 24: FOOTER STYLING
   ========================= */

footer {

/* Footer text */
footer p {

footer a {

}

}
/* =========================

   ========================= */

/* =========================
   STEP 27: FOOTER LAYOUT
   ========================= */

.footer-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
}

/* Footer menu */
.footer-nav {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  justify-content: center;
}

/* Social icons row */

  display: flex;

/* Divider line */

/* =========================
   STEP 29: SOCIAL ICON STYLE
   ========================= */

.footer-social .social-link {

/* Icon text */

/* Hover effect */

/* =========================
   STEP 32: FOOTER FINAL POLISH

/* Improve vertical rhythm */

/* Footer copyright spacing */

/* =========================
   GLOBAL PARAGRAPH — SAFE FINAL
   ========================= */

p {

/* =========================

   ========================= */

@media (max-width: 768px) {

    margin-bottom: 32px;
  }

}
</style>

    rel="noopener"
  >
    Chat Me on WhatsApp
  </a>
  <script>
  // Update footer year
  document.getElementById("year").textContent =
    new Date().getFullYear();

  // Image preview modal logic
  const modal = document.getElementById("imageModal");
  const modalImg = document.getElementById("modalImage");
  const closeBtn = document.getElementById("closeModal");

  document.querySelectorAll(".work-item img").forEach(img => {
    img.addEventListener("click", () => {
      modal.classList.add("active");
      modalImg.src = img.src;
      modalImg.alt = img.alt;
    });
  });

  closeBtn.addEventListener("click", () => {
    modal.classList.remove("active");
  });

  modal.addEventListener("click", (e) => {
    if (e.target === modal) {
      modal.classList.remove("active");
    }
  });
</script>
