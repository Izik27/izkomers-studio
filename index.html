<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Izkomers Studio</title>

  <style>
    /* =========================
       GLOBAL
    ========================= */
    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      color: #111;
      background: #ffffff;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    h2 {
      margin-bottom: 30px;
    }

    p {
      font-size: 1rem;
      line-height: 1.6;
      max-width: 600px;
      margin: 0 auto 20px;
    }

    /* =========================
       HEADER
    ========================= */
    .site-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
    }

    .logo-box {
      background: #111;
      padding: 6px 10px;
      border-radius: 6px;
    }

    .site-logo {
      max-width: 180px;
      display: block;
    }

    .main-nav a {
      text-decoration: none;
      color: #111;
      margin-left: 20px;
      font-weight: 600;
      transition: color 0.2s ease;
    }

    .main-nav a:hover {
      color: #7b2cbf;
    }

    /* Mobile header */
    @media (max-width: 768px) {
      .site-header {
        flex-direction: column;
        gap: 12px;
      }

      .main-nav {
        display: flex;
        gap: 18px;
      }

      .main-nav a {
        margin-left: 0;
      }
    }

    /* =========================
       HERO
    ========================= */
    .hero {
      background: rgba(123, 44, 191, 0.08);
      padding: 60px 20px;
      border-radius: 12px;
      margin-top: 20px;
      margin-bottom: 60px;
    }

    .hero-btn {
      display: inline-block;
      margin-top: 24px;
      padding: 14px 28px;
      background-color: #7b2cbf;
      color: #ffffff;
      text-decoration: none;
      font-weight: 600;
      border-radius: 30px;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.2s ease;
    }

    .hero-btn:hover {
      background-color: #5a189a;
      transform: translateY(-2px);
    }

    /* =========================
       WORK SECTION
    ========================= */
    .work-gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .work-item img {
      width: 100%;
      max-width: 250px;
      border-radius: 8px;
      background: #eaeaea;
      padding: 10px;
    }

    @media (max-width: 1024px) {
      .work-gallery {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      .work-gallery {
        grid-template-columns: 1fr;
      }
    }

    /* =========================
       WHATSAPP FLOAT
    ========================= */
    .whatsapp-float {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background-color: #7b2cbf;
      color: #fff;
      padding: 14px 20px;
      border-radius: 50px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.25);
      z-index: 1000;
    }

    .whatsapp-float:hover {
      background-color: #5a189a;
    }

    /* =========================
       FOOTER
    ========================= */
    footer {
      margin-top: 80px;
      padding: 20px 10px;
      background: #111;
      color: #fff;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>
  <main>

    <!-- HEADER -->
    <header class="site-header" id="home">
      <div class="logo-box">
        <img src="images/logo.png" alt="Izkomers Studio logo" class="site-logo" />
      </div>

      <nav class="main-nav">
        <a href="#home">Home</a>
        <a href="#work">My Work</a>
        <a href="#contact">Contact</a>
      </nav>
    </header>

    <!-- HERO -->
    <section class="hero">
      <h1>Stop Losing Customers With Poor Design</h1>
      <p>
        I create flyers, banners, business cards and branding that attract
        customers.
      </p>

      <a
        href="https://wa.me/2347060988611?text=Hello%20I%20need%20a%20design"
        class="hero-btn"
        target="_blank"
        rel="noopener"
      >
        Get a Design
      </a>
    </section>

    <!-- WORK -->
    <section id="work">
      <h2>My Work</h2>

      <div class="work-gallery">
        <div class="work-item"><img src="images/logo6.png" alt="Logo" /></div>
        <div class="work-item"><img src="images/logo4.png" alt="Logo" /></div>
        <div class="work-item"><img src="images/logo5.png" alt="Logo" /></div>
        <div class="work-item"><img src="images/poster1.jpg" alt="Poster" /></div>
        <div class="work-item"><img src="images/poster2.jpg" alt="Poster" /></div>
        <div class="work-item"><img src="images/poster3.jpg" alt="Poster" /></div>
      </div>
    </section>

    <!-- CONTACT -->
    <footer id="contact">
      <p>© <span id="year"></span> Izkomers Studio</p>
    </footer>

  </main>

  <!-- WHATSAPP FLOAT -->
  <a
    href="https://wa.me/2347060988611"
    class="whatsapp-float"
    target="_blank"
    rel="noopener"
  >
    Chat Me on WhatsApp
  </a>

  <script>
    document.getElementById("year").textContent =
      new Date().getFullYear();
  </script>
</body>
</html>
