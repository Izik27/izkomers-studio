<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Izkomers Studio</title>
    <style>
      /* STEP A1: Smooth scrolling for menu links */
html {
  scroll-behavior: smooth;
}
  body {
    font-family: Arial, sans-serif;
    text-align: center;
  }
  /* STEP 3: Menu basic cleanup */
nav {
  margin-bottom: 20px;   /* space below menu */
}

/* STEP 8: Menu polish (professional & specific) */
.main-nav a {
  text-decoration: none;
  color: #111;
  margin-left: 20px;
  font-weight: 600;
  transition: color 0.2s ease;
}

.main-nav a:hover {
  color: #7b2cbf; /* brand purple from logo */
}
.work-gallery {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
.work-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 60px; /* ⬅ more space between logo & poster */
  margin-bottom: 32px; /* space below each image */
}
.work-gallery img {
  width: 100%;
  max-width: 250px;
  height: auto;
  border-radius: 8px;
  background: #eaeaea;
  padding: 10px;
}
  section {
    margin-bottom: 40px;
  }
  h1 {
  margin-top: 20px;
  margin-bottom: 15px;
}

h2 {
  margin-bottom: 20px;
}

p {
  margin-bottom: 20px;
}
h1 {
  font-size: 2.2rem;
  margin-bottom: 10px;
}

p {
  font-size: 1rem;
  line-height: 1.6;
  max-width: 600px;
  margin: 0 auto 30px;
}

h2 {
  margin-bottom: 30px;
}
main {
  max-width: 1100px;
  margin: 0 auto;
  padding: 20px 20px;
}

section {
  margin-bottom: 60px;
}
.site-logo {
  max-width: 180px;
  width: 100%;
  display: block;
}
.logo-box {
  background: #111;        /* strong contrast */
  padding: 6px 10px;
  border-radius: 6px;

  display: block;          /* KEY CHANGE */
  width: fit-content;      /* shrink to logo */
  margin: 0;               /* force left */
}
.hero {
  margin-bottom: 40px;      /* reduces big gap below header */
}

.hero h1 {
  margin-top: 20px;         /* reduce space above headline */
}

.hero p {
  margin-bottom: 0;         /* tight, clean finish */
}
main {
  padding-top: 20px;   /* instead of 40px */
}
/* ===========================
   RESPONSIVE IMAGE LAYOUT
   =========================== */

/* TABLET VIEW (2 columns) */
@media (max-width: 1024px) {
  .work-gallery {
    grid-template-columns: repeat(2, 1fr);
  }
}

/* MOBILE VIEW (1 column) */
@media (max-width: 600px) {
  .work-gallery {
    grid-template-columns: 1fr;
  }

  .work-gallery img {
    max-width: 100%;
  }
}
/* WhatsApp floating button
   - Fixed position
   - Always visible
   - Professional CTA
*/
/* WhatsApp floating button — brand color */
.whatsapp-float {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background-color: #7b2cbf; /* same as hero button */
  color: #ffffff;
  padding: 14px 20px;
  border-radius: 50px;
  font-weight: 600;
  text-decoration: none;
  box-shadow: 0 6px 15px rgba(0, 0, 0, 0.25);
  z-index: 1000;
}

.whatsapp-float:hover {
  background-color: #5a189a; /* same hover as hero button */
}
/* HEADER LAYOUT */
.site-header {
  display: flex;
  align-items: center;          /* vertical alignment */
  justify-content: space-between; /* logo left, menu right */
  padding: 10px 20px;
}

/* MENU */
.main-nav a {
  margin-left: 20px;
  text-decoration: none;
  color: #111;
  font-weight: 500;
}
footer {
  margin-top: 60px;
  padding: 20px 10px;
  background: #111;
  color: #fff;
  text-align: center;
  font-size: 0.9rem;
}

footer p {
  margin: 0;
}
/* STEP 2: Mobile ordering — logos first, posters after */
@media (max-width: 768px) {
  .work-gallery {
    grid-template-columns: 1fr; /* single column on mobile */
  }

  .logo-item {
    order: 1; /* logos come first */
  }

  .poster-item {
    order: 2; /* posters come after */
  }
}
/* STEP 2: Mobile ordering — logos first, posters after */
@media (max-width: 768px) {
  .work-gallery {
    grid-template-columns: 1fr; /* single column on mobile */
  }

  .logo-item {
    order: 1; /* logos come first */
  }

  .poster-item {
    order: 2; /* posters come after */
  }
}
/* STEP 3C: Clean mobile header spacing & alignment */
@media (max-width: 768px) {

  .site-header {
    flex-direction: column;   /* stack logo and menu */
    align-items: center;
    gap: 12px;                /* space between logo and menu */
  }

  .main-nav {
    display: flex;
    gap: 18px;                /* space between menu items */
  }

}
/* STEP B2: Hero CTA button styling */
.hero-btn {
  display: inline-block;
  margin-top: 24px;
  padding: 14px 28px;
  background-color: #7b2cbf; /* brand purple */
  color: #ffffff;
  text-decoration: none;
  font-weight: 600;
  border-radius: 30px;
  transition: background-color 0.2s ease, transform 0.2s ease;
}

/* Hover effect */
.hero-btn:hover {
  background-color: #5a189a; /* darker brand purple */
  transform: translateY(-2px);
}
</style>
</head>

<body>
  <main>
   <header class="site-header" id="home">

  <div class="logo-box">
    <img src="images/logo.png" alt="Izkomers Studio logo" class="site-logo">
  </div>

  <nav class="main-nav">
    <a href="#">Home</a>
    <a href="#work">My Work</a>
    <a href="#contact">Contact</a>
  </nav>

</header>

<h1>Stop Losing Customers With Poor Design</h1>
<p>I create flyers, banners, business cards and branding that attract customers.</p>
<a href="https://wa.me/2347060988611?text=Hello%20I%20need%20a%20design"
   class="hero-btn"
   target="_blank"
   rel="noopener">
  Get a Design
</a>
</section>  
<section id="work">
  <h2>My Work</h2>

  <div class="work-gallery">

    <!-- LOGOS -->
    <div class="work-item logo-item">
      <img src="images/logo6.png" alt="logo">
    </div>

    <div class="work-item logo-item">
      <img src="images/logo4.png" alt="logo">
    </div>

    <div class="work-item logo-item">
      <img src="images/logo5.png" alt="logo">
    </div>

    <!-- POSTERS -->
    <div class="work-item poster-item">
      <img src="images/poster1.jpg" alt="poster">
    </div>

    <div class="work-item poster-item">

    <div class="work-item poster-item">

  </div>
</section>
<!-- Existing WhatsApp link (enhanced with styling) -->
<a 
  href="https://wa.me/2347060988611?text=Hello%20I%20saw%20your%20designs%20and%20I%20want%20to%20work%20with%20you"
  target="_blank"
  rel="noopener"
  class="whatsapp-float"
>
  Chat Me on WhatsApp
</a>
<footer id="contact">
  <p>© <span id="year"></span> Izkomers Studio</p>
</footer>
</main>
<script>
  document.getElementById("year").textContent = new Date().getFullYear();
</script>
</body>
</html>
