<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Izkomers Studio</title>
    <style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
  }
.work-gallery {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
.work-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 60px; /* ⬅ more space between logo & poster */
  margin-bottom: 32px; /* space below each image */
}
.work-gallery img {
  width: 100%;
  max-width: 250px;
  height: auto;
  border-radius: 8px;
  background: #eaeaea;
  padding: 10px;
}
  section {
    margin-bottom: 40px;
  }
  h1 {
  margin-top: 20px;
  margin-bottom: 15px;
}

h2 {
  margin-bottom: 20px;
}

p {
  margin-bottom: 20px;
}
h1 {
  font-size: 2.2rem;
  margin-bottom: 10px;
}

p {
  font-size: 1rem;
  line-height: 1.6;
  max-width: 600px;
  margin: 0 auto 30px;
}

h2 {
  margin-bottom: 30px;
}
main {
  max-width: 1100px;
  margin: 0 auto;
  padding: 40px 20px;
}

section {
  margin-bottom: 60px;
}
.site-logo {
  max-width: 180px;
  width: 100%;
  display: block;
}
.logo-box {
  background: #111;        /* strong contrast */
  padding: 6px 10px;
  border-radius: 6px;

  display: block;          /* KEY CHANGE */
  width: fit-content;      /* shrink to logo */
  margin: 0;               /* force left */
}
.hero {
  margin-bottom: 40px;      /* reduces big gap below header */
}

.hero h1 {
  margin-top: 20px;         /* reduce space above headline */
}

.hero p {
  margin-bottom: 0;         /* tight, clean finish */
}
main {
  padding-top: 20px;   /* instead of 40px */
}
/* ===========================
   RESPONSIVE IMAGE LAYOUT
   =========================== */

/* TABLET VIEW (2 columns) */
@media (max-width: 1024px) {
  .work-gallery {
    grid-template-columns: repeat(2, 1fr);
  }
}

/* MOBILE VIEW (1 column) */
@media (max-width: 600px) {
  .work-gallery {
    grid-template-columns: 1fr;
  }

  .work-gallery img {
    max-width: 100%;
  }
}
</style>
</head>

<body>
  <main>
<section class="hero">
<div class="logo-box">
  <img src="images/logo.png" alt="Izkomers Studio logo" class="site-logo">
</div>

<h1>Stop Losing Customers With Poor Design</h1>
<p>I create flyers, banners, business cards and branding that attract customers.</p>
</section>  
<section>
  <h2>My Work</h2>

  <div class="work-gallery">

    <div class="work-item">
      <img src="images/logo6.png" alt="logo">
      <img src="images/poster1.jpg" alt="poster">
    </div>

    <div class="work-item">
      <img src="images/logo4.png" alt="logo">
      <img src="images/poster2.jpg" alt="poster">
    </div>

    <div class="work-item">
      <img src="images/logo5.png" alt="logo">
      <img src="images/poster3.jpg" alt="poster">
    </div>

  </div>
</section>

<a 
  href="https://wa.me/2347060988611?text=Hello%20I%20saw%20your%20designs%20and%20I%20want%20to%20work%20with%20you"
  target="_blank"
  rel="noopener"
>
  Chat Me on WhatsApp
</a>
<footer>
  <p>© 2026 Izkomers Studio</p>
</footer>
</main>
</body>
</html>
